<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Pocket - ระบบบัญชีไรเดอร์</title>
    
    <!-- เพิ่ม Meta Tags สำหรับการทำเป็น App บนมือถือ (PWA) -->
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- นำเข้า Tailwind CSS เพื่อจัดการความสวยงาม -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- ปรับแต่งพฤติกรรมบนมือถือเพิ่มเติม -->
    <style>
        /* จัดการขอบจอด้านล่างสำหรับ iPhone/Android รุ่นใหม่ */
        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 10px); }
        /* ป้องกันการเด้งของหน้าจอเวลาเลื่อนสุด (เหมือนแอปจริง) */
        body { overscroll-behavior-y: none; -webkit-tap-highlight-color: transparent; }
        /* ป้องกันการซูมหน้าจอเวลาพิมพ์บน iPhone */
        input[type="number"], input[type="date"], input[type="time"], input[type="text"] { font-size: 16px !important; }
    </style>

    <!-- นำเข้า Babel เพื่อแปลภาษา React (JSX) ให้เบราว์เซอร์เข้าใจ -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <!-- จุดที่ React จะนำแอปมาแสดงผล -->
    <div id="root"></div>

    <!-- โค้ด React ของแอปพลิเคชัน -->
    <script type="text/babel" data-type="module">
        // นำเข้า React และเครื่องมือที่จำเป็นผ่านเครือข่าย
        import React, { useState, useMemo, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
          Wallet, TrendingUp, TrendingDown, PlusCircle, List as ListIcon, 
          Home, Trash2, Calendar, DollarSign, Bike, Coffee, Wrench, Wifi, MoreHorizontal, Clock,
          Play, StopCircle, Sun, CheckCircle2, Receipt
        } from 'https://esm.sh/lucide-react@0.292.0';

        // นำเข้า Firebase SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ข้อมูลแพลตฟอร์มต่างๆ และสี
        const PLATFORMS = {
          'Grab': { color: 'bg-green-600', textColor: 'text-green-600' },
          'LINE MAN': { color: 'bg-green-500', textColor: 'text-green-500' },
          'Foodpanda': { color: 'bg-pink-600', textColor: 'text-pink-600' },
          'ShopeeFood': { color: 'bg-orange-500', textColor: 'text-orange-500' },
          'Lalamove': { color: 'bg-orange-600', textColor: 'text-orange-600' },
          'inDrive': { color: 'bg-green-400', textColor: 'text-green-400' },
          'Bolt': { color: 'bg-green-700', textColor: 'text-green-700' },
          'อื่นๆ': { color: 'bg-gray-600', textColor: 'text-gray-600' }
        };

        const EXPENSE_CATEGORIES = {
          'ค่าน้ำมัน': { icon: Bike, color: 'text-orange-500' },
          'ค่าอาหาร/น้ำ': { icon: Coffee, color: 'text-blue-500' },
          'ซ่อมบำรุงรถ': { icon: Wrench, color: 'text-gray-700' },
          'ค่าเน็ต/โทรศัพท์': { icon: Wifi, color: 'text-purple-500' },
          'อื่นๆ': { icon: MoreHorizontal, color: 'text-gray-500' }
        };

        const GREETINGS = [
          "ขอให้วันนี้เป็นวันที่ดี ออเดอร์ปังๆ ทิปแน่นๆ นะครับ! 🛵💨",
          "ขับขี่ปลอดภัย ลูกค้าน่ารัก ได้โบนัสรัวๆ ครับ! 🌟",
          "สู้ๆ ครับไรเดอร์คนเก่ง วันนี้เป้าหมายทะลุเป้าแน่นอน! 💪",
          "อากาศจะร้อนหรือฝนจะตก ก็ขอให้ใจร่มๆ ได้งานเยอะๆ นะครับ! 🌤️",
          "เริ่มต้นวันใหม่ ขอให้เงินไหลมาเทมา ปลอดภัยตลอดสายครับ! 💸",
          "ลุยเลย! ถนนโล่งๆ ลูกค้ารอแจกทิปอยู่ครับ 🎉"
        ];

        // 🔴 Firebase Config ของคุณ 🔴
        const myFirebaseConfig = {
          apiKey: "AIzaSyAOuX9u4eYf8OVFS_Djqceu1MAiasPa5Wc",
          authDomain: "rider-ca9e9.firebaseapp.com",
          projectId: "rider-ca9e9",
          storageBucket: "rider-ca9e9.firebasestorage.app",
          messagingSenderId: "445078558662",
          appId: "1:445078558662:web:e832ac83b64280304944c7",
          measurementId: "G-LWCVR69NMD"
        };

        // ตรวจสอบว่ารันบนหน้าต่างพรีวิว หรือ GitHub Pages เพื่อเลือกใช้ Config ที่ถูกต้อง
        const isCanvasEnv = typeof __firebase_config !== 'undefined';
        const finalFirebaseConfig = isCanvasEnv ? JSON.parse(__firebase_config) : myFirebaseConfig;
        const currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'rider-pocket';

        // ตั้งค่าระบบฐานข้อมูล Firebase
        const app = initializeApp(finalFirebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function App() {
          const [activeTab, setActiveTab] = useState('dashboard'); // dashboard, add, history
          const [records, setRecords] = useState([]);
          const [isLoading, setIsLoading] = useState(true);
          const [connectionError, setConnectionError] = useState('');
          const [user, setUser] = useState(null);
          
          // Work Status State ('idle', 'working', 'on_break') ดึงค่าจาก Local Storage ให้จำค่าไว้
          const [workStatus, setWorkStatus] = useState(() => localStorage.getItem('riderWorkStatus') || 'idle');
          
          // Modal State สำหรับแสดงคำอวยพรและยืนยันจบงาน
          const [modalConfig, setModalConfig] = useState({ isOpen: false, type: null });
          const [currentGreeting, setCurrentGreeting] = useState('');
          
          // Form State
          const [formType, setFormType] = useState('income');
          const [amount, setAmount] = useState('');
          const [platform, setPlatform] = useState('Grab');
          const [category, setCategory] = useState('ค่าน้ำมัน');
          const [note, setNote] = useState('');
          const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
          const [time, setTime] = useState(new Date().toTimeString().split(' ')[0].substring(0, 5));

          // อัปเดต Local Storage ทุกครั้งที่ Work Status เปลี่ยนแปลง
          useEffect(() => {
            localStorage.setItem('riderWorkStatus', workStatus);
          }, [workStatus]);

          // 1. จัดการระบบล็อกอิน (แบบไม่ระบุตัวตน - Anonymous) เพื่อให้มีสิทธิ์บันทึกข้อมูล
          useEffect(() => {
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  await signInAnonymously(auth);
                }
              } catch (error) {
                console.error("Auth error:", error);
                setConnectionError(`Auth error: ${error.message}`);
              }
            };
            initAuth();
            
            const unsubscribe = onAuthStateChanged(auth, setUser);
            return () => unsubscribe();
          }, []);

          // 2. ดึงข้อมูลจาก Firebase Firestore แบบ Real-time
          useEffect(() => {
            if (!user) return;
            
            setIsLoading(true);
            setConnectionError('');
            
            const recordsRef = collection(db, 'artifacts', currentAppId, 'users', user.uid, 'records');
            
            const unsubscribe = onSnapshot(recordsRef, (snapshot) => {
              const data = [];
              snapshot.forEach((doc) => {
                data.push({ id: doc.id, ...doc.data() });
              });
              
              // เรียงวันที่และเวลา จากใหม่ไปเก่า
              data.sort((a, b) => {
                const dateA = new Date(a.date + 'T' + (a.time || '00:00'));
                const dateB = new Date(b.date + 'T' + (b.time || '00:00'));
                return dateB - dateA;
              });
              
              setRecords(data);
              setIsLoading(false);
            }, (error) => {
              console.error("Firebase fetch error:", error);
              setConnectionError("ไม่สามารถดึงข้อมูลได้ โปรดตรวจสอบการเชื่อมต่ออินเทอร์เน็ต");
              setIsLoading(false);
            });
            
            return () => unsubscribe(); 
          }, [user]);

          // คำนวณสรุปยอดทั้งหมด (สำหรับหน้าภาพรวม)
          const summary = useMemo(() => {
            let totalIncome = 0;
            let totalExpense = 0;
            let totalTrips = 0;
            const platformTotals = {};

            records.forEach(record => {
              const amt = parseFloat(record.amount);
              if (record.type === 'income') {
                totalIncome += amt;
                totalTrips += 1;
                platformTotals[record.platform] = (platformTotals[record.platform] || 0) + amt;
              } else {
                totalExpense += amt;
              }
            });

            return {
              totalIncome,
              totalExpense,
              totalTrips,
              net: totalIncome - totalExpense,
              platformTotals
            };
          }, [records]);

          // คำนวณสรุปยอด "เฉพาะวันนี้" (สำหรับตอนกดจบงาน)
          const todaySummary = useMemo(() => {
            const todayStr = new Date().toISOString().split('T')[0];
            let totalIncome = 0;
            let totalExpense = 0;
            let totalTrips = 0;
            const platformTotals = {};

            records.filter(r => r.date === todayStr).forEach(record => {
              const amt = parseFloat(record.amount);
              if (record.type === 'income') {
                totalIncome += amt;
                totalTrips += 1;
                platformTotals[record.platform] = (platformTotals[record.platform] || 0) + amt;
              } else {
                totalExpense += amt;
              }
            });

            return {
              totalIncome,
              totalExpense,
              totalTrips,
              net: totalIncome - totalExpense,
              platformTotals
            };
          }, [records]);

          // 3. จัดการการบันทึกข้อมูลลง Firebase
          const handleSave = async (e) => {
            e.preventDefault();
            if (!amount || isNaN(amount) || amount <= 0 || !user) return;

            const newRecord = {
              type: formType,
              amount: parseFloat(amount),
              date: date,
              time: time,
              note: note,
              ...(formType === 'income' ? { platform } : { category }),
              timestamp: new Date().toISOString()
            };
            
            try {
              const newDocRef = doc(collection(db, 'artifacts', currentAppId, 'users', user.uid, 'records'));
              await setDoc(newDocRef, newRecord);
              
              setAmount('');
              setNote('');
              setTime(new Date().toTimeString().split(' ')[0].substring(0, 5));
              setActiveTab('dashboard');
            } catch (error) {
              console.error("บันทึกข้อมูลลง Firebase ไม่สำเร็จ:", error);
              setConnectionError("บันทึกข้อมูลไม่สำเร็จ กรุณาลองใหม่อีกครั้ง");
            }
          };

          // 4. ลบข้อมูลจาก Firebase
          const deleteRecord = async (id) => {
            if (!user) return;
            try {
              await deleteDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'records', id));
            } catch (error) {
              console.error("Delete error:", error);
            }
          };

          // --- ฟังก์ชันจัดการสถานะการทำงาน ---
          const handleStartWork = () => {
            const randomMsg = GREETINGS[Math.floor(Math.random() * GREETINGS.length)];
            setCurrentGreeting(randomMsg);
            setWorkStatus('working');
            setModalConfig({ isOpen: true, type: 'greeting' });
          };

          const handleTakeBreak = () => {
            setWorkStatus('on_break');
          };

          const handleResumeWork = () => {
            setWorkStatus('working');
          };

          const promptEndWork = () => {
            setModalConfig({ isOpen: true, type: 'end_confirm' });
          };

          const handleEndWork = () => {
            setWorkStatus('idle'); // เปลี่ยนสถานะเป็นว่าง
            setModalConfig({ isOpen: true, type: 'end_summary' }); // เปิดหน้าสรุปยอด
          };

          const closeModal = () => {
            setModalConfig({ isOpen: false, type: null });
          };

          // --- ส่วนประกอบ UI ---
          const renderDashboard = () => (
            <div className="space-y-4 animate-in fade-in slide-in-from-bottom-2 duration-300">
              
              {/* ส่วนแสดง Error (ถ้ามี) */}
              {connectionError && (
                <div className="bg-red-50 text-red-600 p-3 rounded-xl text-sm border border-red-200">
                  ⚠️ {connectionError}
                </div>
              )}

              {/* วิดเจ็ต: สถานะการทำงาน */}
              <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-gray-800 font-semibold flex items-center">
                    <Clock className="w-5 h-5 mr-2 text-indigo-500" /> สถานะงานวันนี้
                  </h3>
                  {workStatus === 'working' && <span className="flex items-center text-xs font-bold text-green-600 bg-green-100 px-2 py-1 rounded-full"><span className="w-2 h-2 rounded-full bg-green-500 mr-1 animate-pulse"></span> กำลังวิ่งงาน</span>}
                  {workStatus === 'on_break' && <span className="flex items-center text-xs font-bold text-amber-600 bg-amber-100 px-2 py-1 rounded-full"><Coffee className="w-3 h-3 mr-1" /> พักผ่อน</span>}
                </div>

                {workStatus === 'idle' && (
                  <button onClick={handleStartWork} className="w-full bg-gradient-to-r from-indigo-600 to-blue-500 text-white font-bold py-4 rounded-xl shadow-md hover:shadow-lg transition flex items-center justify-center active:scale-[0.98]">
                    <Play className="w-6 h-6 mr-2" fill="currentColor" /> เริ่มงานวันนี้
                  </button>
                )}

                {workStatus === 'working' && (
                  <div className="flex space-x-3">
                    <button onClick={handleTakeBreak} className="flex-1 bg-amber-100 text-amber-700 font-bold py-3 rounded-xl hover:bg-amber-200 transition flex items-center justify-center active:scale-[0.98]">
                      <Coffee className="w-5 h-5 mr-2" /> พักแป๊บ
                    </button>
                    <button onClick={promptEndWork} className="flex-1 bg-rose-100 text-rose-700 font-bold py-3 rounded-xl hover:bg-rose-200 transition flex items-center justify-center active:scale-[0.98]">
                      <StopCircle className="w-5 h-5 mr-2" /> จบงาน
                    </button>
                  </div>
                )}

                {workStatus === 'on_break' && (
                  <div className="flex space-x-3">
                    <button onClick={handleResumeWork} className="flex-1 bg-green-100 text-green-700 font-bold py-3 rounded-xl hover:bg-green-200 transition flex items-center justify-center active:scale-[0.98]">
                      <Play className="w-5 h-5 mr-2" fill="currentColor" /> ลุยต่อ
                    </button>
                    <button onClick={promptEndWork} className="flex-1 bg-rose-100 text-rose-700 font-bold py-3 rounded-xl hover:bg-rose-200 transition flex items-center justify-center active:scale-[0.98]">
                      <StopCircle className="w-5 h-5 mr-2" /> จบงาน
                    </button>
                  </div>
                )}
              </div>

              {/* การ์ดสรุปยอดรวม */}
              <div className="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl p-5 text-white shadow-lg">
                <div className="flex justify-between items-center mb-1">
                  <h2 className="text-blue-100 text-sm font-medium">กำไรสุทธิทั้งหมด (บาท)</h2>
                  {isLoading && <span className="text-xs text-blue-200 animate-pulse">กำลังซิงค์...</span>}
                </div>
                <div className="text-4xl font-bold tracking-tight">
                  ฿{summary.net.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                </div>
                
                <div className="grid grid-cols-3 gap-3 mt-6">
                  <div className="bg-white/10 rounded-xl p-3 flex flex-col items-center justify-center">
                    <div className="flex items-center text-blue-200 text-xs mb-1">
                      <Bike className="w-3 h-3 mr-1" /> รอบวิ่ง
                    </div>
                    <div className="text-lg font-semibold">{summary.totalTrips}</div>
                  </div>
                  <div className="bg-white/10 rounded-xl p-3 flex flex-col items-center justify-center">
                    <div className="flex items-center text-green-200 text-xs mb-1">
                      <TrendingUp className="w-3 h-3 mr-1" /> รายรับ
                    </div>
                    <div className="text-lg font-semibold">฿{summary.totalIncome.toLocaleString('th-TH')}</div>
                  </div>
                  <div className="bg-white/10 rounded-xl p-3 flex flex-col items-center justify-center">
                    <div className="flex items-center text-red-200 text-xs mb-1">
                      <TrendingDown className="w-3 h-3 mr-1" /> รายจ่าย
                    </div>
                    <div className="text-lg font-semibold">฿{summary.totalExpense.toLocaleString('th-TH')}</div>
                  </div>
                </div>
              </div>

              {/* สรุปรายได้แยกตามค่าย */}
              <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                <h3 className="text-gray-800 font-semibold mb-4 flex items-center">
                  <Wallet className="w-5 h-5 mr-2 text-indigo-500" /> 
                  รายได้แยกตามค่าย
                </h3>
                
                {Object.keys(summary.platformTotals).length > 0 ? (
                  <div className="space-y-3">
                    {Object.entries(summary.platformTotals)
                      .sort(([,a], [,b]) => b - a)
                      .map(([plat, val]) => (
                      <div key={plat} className="flex items-center justify-between">
                        <div className="flex items-center">
                          <div className={`w-3 h-3 rounded-full mr-3 ${PLATFORMS[plat]?.color || 'bg-gray-500'}`}></div>
                          <span className="text-gray-700 font-medium">{plat}</span>
                        </div>
                        <div className="font-semibold text-gray-900">฿{val.toLocaleString('th-TH')}</div>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="text-center text-gray-400 py-4 text-sm">
                    {isLoading ? 'กำลังโหลดข้อมูล...' : 'ยังไม่มีข้อมูลรายรับ'}
                  </div>
                )}
              </div>
            </div>
          );

          const renderAddRecord = () => (
            <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 animate-in fade-in slide-in-from-bottom-2 duration-300">
              <h2 className="text-xl font-bold text-gray-800 mb-6 text-center">บันทึกงาน / รายจ่าย</h2>
              
              {/* เช็คสถานะการทำงาน: ถ้ายังไม่เริ่มงาน ไม่ให้บันทึก */}
              {workStatus === 'idle' ? (
                <div className="text-center py-8">
                  <div className="bg-gray-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <StopCircle className="w-10 h-10 text-gray-400" />
                  </div>
                  <h3 className="text-lg font-bold text-gray-700 mb-2">คุณยังไม่ได้เริ่มงาน</h3>
                  <p className="text-gray-500 mb-6 text-sm">กรุณากด "เริ่มงานวันนี้" ที่หน้าภาพรวมก่อน<br/>เพื่อเริ่มบันทึกรายรับ-รายจ่ายครับ</p>
                  <button
                    onClick={() => setActiveTab('dashboard')}
                    className="w-full bg-indigo-600 text-white font-bold py-3 px-6 rounded-xl hover:bg-indigo-700 transition active:scale-[0.98]"
                  >
                    กลับไปหน้าภาพรวม
                  </button>
                </div>
              ) : (
                <>
                  {/* ตัวสลับ รายรับ/รายจ่าย */}
                  <div className="flex p-1 bg-gray-100 rounded-xl mb-6">
                    <button 
                      onClick={() => setFormType('income')}
                      className={`flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${
                        formType === 'income' ? 'bg-white text-green-600 shadow-sm' : 'text-gray-500'
                      }`}
                    >
                      + ค่ารอบ (รายรับ)
                    </button>
                    <button 
                      onClick={() => setFormType('expense')}
                      className={`flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${
                        formType === 'expense' ? 'bg-white text-red-600 shadow-sm' : 'text-gray-500'
                      }`}
                    >
                      - รายจ่าย
                    </button>
                  </div>

                  <form onSubmit={handleSave} className="space-y-4">
                    {/* จำนวนเงิน */}
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">
                        {formType === 'income' ? 'ค่ารอบที่ได้ + ทิป (บาท)' : 'จำนวนเงิน (บาท)'}
                      </label>
                      <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                          <DollarSign className="h-5 w-5 text-gray-400" />
                        </div>
                        <input
                          type="number"
                          inputMode="decimal"
                          pattern="[0-9]*"
                          required
                          min="1"
                          step="0.01"
                          value={amount}
                          onChange={(e) => setAmount(e.target.value)}
                          className="block w-full pl-10 pr-3 py-4 border-2 border-indigo-100 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-2xl font-bold text-gray-800"
                          placeholder="0.00"
                        />
                      </div>
                    </div>

                    {/* เลือกค่าย หรือ หมวดหมู่ */}
                    {formType === 'income' ? (
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">วิ่งค่ายไหน?</label>
                        <div className="grid grid-cols-2 gap-2">
                          {Object.keys(PLATFORMS).map(plat => (
                            <button
                              key={plat}
                              type="button"
                              onClick={() => setPlatform(plat)}
                              className={`py-2 px-3 text-sm font-medium rounded-xl border transition-all ${
                                platform === plat 
                                  ? `${PLATFORMS[plat].textColor} border-${PLATFORMS[plat].textColor.split('-')[1]}-500 bg-${PLATFORMS[plat].textColor.split('-')[1]}-50 shadow-sm` 
                                  : 'border-gray-200 text-gray-600 hover:bg-gray-50'
                              }`}
                            >
                              {plat}
                            </button>
                          ))}
                        </div>
                      </div>
                    ) : (
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">หมวดหมู่รายจ่าย</label>
                        <div className="grid grid-cols-2 gap-2">
                          {Object.entries(EXPENSE_CATEGORIES).map(([catName, catData]) => {
                            const Icon = catData.icon;
                            return (
                              <button
                                key={catName}
                                type="button"
                                onClick={() => setCategory(catName)}
                                className={`flex items-center justify-center py-2 px-3 text-sm font-medium rounded-xl border transition-all ${
                                  category === catName 
                                    ? `${catData.color} border-current bg-gray-50 shadow-sm` 
                                    : 'border-gray-200 text-gray-600 hover:bg-gray-50'
                                }`}
                              >
                                <Icon className="w-4 h-4 mr-2" /> {catName}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    )}

                    {/* วันที่ และ เวลา */}
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">วันที่</label>
                        <div className="relative">
                          <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <Calendar className="h-4 w-4 text-gray-400" />
                          </div>
                          <input
                            type="date"
                            required
                            value={date}
                            onChange={(e) => setDate(e.target.value)}
                            className="block w-full pl-9 pr-2 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm"
                          />
                        </div>
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">เวลา</label>
                        <div className="relative">
                          <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <Clock className="h-4 w-4 text-gray-400" />
                          </div>
                          <input
                            type="time"
                            required
                            value={time}
                            onChange={(e) => setTime(e.target.value)}
                            className="block w-full pl-9 pr-2 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm"
                          />
                        </div>
                      </div>
                    </div>

                    {/* หมายเหตุ */}
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">หมายเหตุ (ถ้ามี)</label>
                      <input
                        type="text"
                        value={note}
                        onChange={(e) => setNote(e.target.value)}
                        className="block w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder={formType === 'income' ? "เช่น ลูกค้าให้ทิป, รหัสงาน..." : "เช่น ปะยาง, ข้าวมันไก่..."}
                      />
                    </div>

                    <button
                      type="submit"
                      className={`w-full py-4 rounded-xl text-white font-bold text-lg shadow-md transition-all active:scale-[0.98] ${
                        formType === 'income' ? 'bg-green-600 hover:bg-green-700' : 'bg-red-600 hover:bg-red-700'
                      }`}
                    >
                      บันทึก{formType === 'income' ? 'ค่ารอบ' : 'รายจ่าย'}
                    </button>
                  </form>
                </>
              )}
            </div>
          );

          const renderHistory = () => (
            <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 min-h-[60vh] animate-in fade-in slide-in-from-bottom-2 duration-300">
              <h2 className="text-xl font-bold text-gray-800 mb-4">ประวัติการบันทึก</h2>
              
              {isLoading && records.length === 0 ? (
                <div className="text-center text-gray-400 py-10 flex flex-col items-center">
                   <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-500 mb-4"></div>
                   <p>กำลังดึงข้อมูลจาก Firebase...</p>
                </div>
              ) : records.length === 0 ? (
                <div className="text-center text-gray-400 py-10 flex flex-col items-center">
                  <ListIcon className="w-12 h-12 mb-2 text-gray-300" />
                  <p>ยังไม่มีประวัติการบันทึก</p>
                </div>
              ) : (
                <div className="space-y-3">
                  {records.map(record => (
                    <div key={record.id} className="flex items-center justify-between p-3 border border-gray-100 rounded-xl hover:bg-gray-50 transition-colors">
                      <div className="flex items-center">
                        <div className={`p-2 rounded-full mr-3 ${record.type === 'income' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>
                          {record.type === 'income' ? <Bike className="w-5 h-5" /> : <TrendingDown className="w-5 h-5" />}
                        </div>
                        <div>
                          <div className="font-semibold text-gray-800">
                            {record.type === 'income' ? `งาน ${record.platform}` : record.category}
                          </div>
                          <div className="text-xs text-gray-500 flex items-center">
                            {record.date} {record.time ? `• ${record.time} น.` : ''} 
                            {record.note && <span className="ml-1 text-gray-400 truncate max-w-[100px]">({record.note})</span>}
                          </div>
                        </div>
                      </div>
                      <div className="flex items-center">
                        <span className={`font-bold mr-3 ${record.type === 'income' ? 'text-green-600' : 'text-red-600'}`}>
                          {record.type === 'income' ? '+' : '-'}฿{record.amount.toLocaleString('th-TH')}
                        </span>
                        <button 
                          onClick={() => deleteRecord(record.id)}
                          className="p-1 text-gray-400 hover:text-red-500 transition-colors"
                        >
                          <Trash2 className="w-4 h-4" />
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );

          return (
            <div className="min-h-screen bg-gray-50 font-sans pb-20">
              {/* Header */}
              <header className="bg-white px-5 py-4 shadow-sm sticky top-0 z-10 flex items-center justify-between">
                <div className="flex items-center">
                  <div className="bg-indigo-600 p-2 rounded-lg mr-3">
                    <Wallet className="w-6 h-6 text-white" />
                  </div>
                  <h1 className="text-xl font-bold text-gray-800">Rider Pocket</h1>
                </div>
              </header>

              {/* Main Content */}
              <main className="max-w-md mx-auto p-4">
                {activeTab === 'dashboard' && renderDashboard()}
                {activeTab === 'add' && renderAddRecord()}
                {activeTab === 'history' && renderHistory()}
              </main>

              {/* Bottom Navigation */}
              <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 pb-safe">
                <div className="max-w-md mx-auto flex justify-around p-2">
                  <button 
                    onClick={() => setActiveTab('dashboard')}
                    className={`flex flex-col items-center p-2 w-20 rounded-xl transition-all ${activeTab === 'dashboard' ? 'text-indigo-600 bg-indigo-50' : 'text-gray-500 hover:bg-gray-50'}`}
                  >
                    <Home className="w-6 h-6 mb-1" />
                    <span className="text-[10px] font-medium">ภาพรวม</span>
                  </button>
                  
                  <button 
                    onClick={() => setActiveTab('add')}
                    className={`flex flex-col items-center p-2 w-20 rounded-xl transition-all ${activeTab === 'add' ? 'text-indigo-600 bg-indigo-50' : 'text-gray-500 hover:bg-gray-50'}`}
                  >
                    <PlusCircle className="w-6 h-6 mb-1" />
                    <span className="text-[10px] font-medium">บันทึกรอบ</span>
                  </button>
                  
                  <button 
                    onClick={() => setActiveTab('history')}
                    className={`flex flex-col items-center p-2 w-20 rounded-xl transition-all ${activeTab === 'history' ? 'text-indigo-600 bg-indigo-50' : 'text-gray-500 hover:bg-gray-50'}`}
                  >
                    <ListIcon className="w-6 h-6 mb-1" />
                    <span className="text-[10px] font-medium">ประวัติ</span>
                  </button>
                </div>
              </nav>

              {/* Modal (หน้าต่างแจ้งเตือนต่างๆ) */}
              {modalConfig.isOpen && (
                <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 animate-in fade-in duration-200 backdrop-blur-sm">
                  <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-in zoom-in-95 duration-200">
                    
                    {/* Modal: คำอวยพรเริ่มงาน */}
                    {modalConfig.type === 'greeting' && (
                      <div className="text-center">
                        <div className="bg-gradient-to-br from-green-400 to-emerald-500 text-white w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-5 shadow-lg shadow-green-200">
                          <Sun className="w-10 h-10" />
                        </div>
                        <h3 className="text-2xl font-bold text-gray-800 mb-2">อรุณสวัสดิ์ไรเดอร์!</h3>
                        <p className="text-gray-600 mb-8 text-lg">{currentGreeting}</p>
                        <button onClick={closeModal} className="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 shadow-md active:scale-[0.98] transition">
                          ลุยเลย! 🛵💨
                        </button>
                      </div>
                    )}

                    {/* Modal: ยืนยันจบงาน */}
                    {modalConfig.type === 'end_confirm' && (
                      <div className="text-center">
                        <div className="bg-gradient-to-br from-rose-400 to-red-500 text-white w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-5 shadow-lg shadow-rose-200">
                          <CheckCircle2 className="w-10 h-10" />
                        </div>
                        <h3 className="text-2xl font-bold text-gray-800 mb-2">จบงานวันนี้?</h3>
                        <p className="text-gray-600 mb-8">คุณวิ่งงานมาเหนื่อยแล้ว ต้องการจบงานเพื่อดูสรุปยอดใช่ไหมครับ?</p>
                        <div className="flex space-x-3">
                          <button onClick={closeModal} className="flex-1 bg-gray-100 text-gray-700 font-bold py-4 rounded-xl hover:bg-gray-200 active:scale-[0.98] transition">
                            ยังก่อน
                          </button>
                          <button onClick={handleEndWork} className="flex-1 bg-rose-600 text-white font-bold py-4 rounded-xl hover:bg-rose-700 shadow-md active:scale-[0.98] transition">
                            ใช่, จบงานเลย
                          </button>
                        </div>
                      </div>
                    )}

                    {/* Modal: สรุปยอดหลังจบงาน */}
                    {modalConfig.type === 'end_summary' && (
                      <div className="text-center">
                        <div className="bg-gradient-to-br from-indigo-500 to-blue-600 text-white w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-5 shadow-lg shadow-indigo-200">
                          <Receipt className="w-10 h-10" />
                        </div>
                        <h3 className="text-2xl font-bold text-gray-800 mb-2">สรุปยอดวันนี้</h3>
                        <p className="text-gray-600 mb-5">เก่งมากครับ! พักผ่อนให้เต็มที่นะ 🎉</p>

                        {/* กล่องรายละเอียดสรุปยอด */}
                        <div className="bg-gray-50 rounded-xl p-4 mb-4 text-left space-y-3">
                          <div className="flex justify-between items-center border-b border-gray-200 pb-2">
                            <span className="text-gray-600">วิ่งไปทั้งหมด</span>
                            <span className="font-bold text-gray-800">{todaySummary.totalTrips} รอบ</span>
                          </div>
                          <div className="flex justify-between items-center border-b border-gray-200 pb-2">
                            <span className="text-gray-600">รายรับรวม</span>
                            <span className="font-bold text-green-600">฿{todaySummary.totalIncome.toLocaleString('th-TH')}</span>
                          </div>
                          <div className="flex justify-between items-center border-b border-gray-200 pb-2">
                            <span className="text-gray-600">รายจ่ายรวม</span>
                            <span className="font-bold text-red-600">฿{todaySummary.totalExpense.toLocaleString('th-TH')}</span>
                          </div>
                          <div className="flex justify-between items-center pt-1">
                            <span className="text-gray-800 font-bold">กำไรสุทธิ</span>
                            <span className="font-bold text-indigo-600 text-xl">฿{todaySummary.net.toLocaleString('th-TH')}</span>
                          </div>
                        </div>

                        {/* กล่องแยกยอดตามค่าย (แสดงก็ต่อเมื่อมีข้อมูล) */}
                        {Object.keys(todaySummary.platformTotals).length > 0 && (
                          <div className="bg-white border border-gray-100 rounded-xl p-4 mb-6 text-left">
                            <h4 className="text-sm font-bold text-gray-700 mb-3">แยกตามค่ายที่วิ่งวันนี้</h4>
                            <div className="space-y-2">
                              {Object.entries(todaySummary.platformTotals)
                                .sort(([,a], [,b]) => b - a)
                                .map(([plat, val]) => (
                                <div key={plat} className="flex justify-between text-sm">
                                  <span className="text-gray-600 flex items-center">
                                    <span className={`w-2 h-2 rounded-full mr-2 ${PLATFORMS[plat]?.color || 'bg-gray-500'}`}></span>
                                    {plat}
                                  </span>
                                  <span className="font-semibold text-gray-800">฿{val.toLocaleString('th-TH')}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}

                        <button onClick={closeModal} className="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 shadow-md active:scale-[0.98] transition">
                          ปิดหน้าต่าง
                        </button>
                      </div>
                    )}

                  </div>
                </div>
              )}

            </div>
          );
        }

        // เริ่มต้นเรนเดอร์ React App
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
