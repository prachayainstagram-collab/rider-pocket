<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Pocket - ระบบบัญชีไรเดอร์</title>
    
    <!-- เพิ่ม Meta Tags สำหรับการทำเป็น App บนมือถือ (PWA) -->
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- นำเข้า Tailwind CSS เพื่อจัดการความสวยงาม -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- ตั้งค่า Tailwind ให้รองรับ Dark Mode ผ่าน class -->
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    
    <!-- ปรับแต่งพฤติกรรมบนมือถือเพิ่มเติม -->
    <style>
        /* จัดการขอบจอด้านล่างสำหรับ iPhone/Android รุ่นใหม่ */
        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 10px); }
        /* ป้องกันการเด้งของหน้าจอเวลาเลื่อนสุด (เหมือนแอปจริง) */
        body { overscroll-behavior-y: none; -webkit-tap-highlight-color: transparent; }
        /* ป้องกันการซูมหน้าจอเวลาพิมพ์บน iPhone */
        input[type="number"], input[type="date"], input[type="time"], input[type="text"] { font-size: 16px !important; }
        /* ซ่อน Scrollbar แต่ยังเลื่อนได้ */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <!-- นำเข้า Babel เพื่อแปลภาษา React (JSX) ให้เบราว์เซอร์เข้าใจ -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-200">
    <!-- จุดที่ React จะนำแอปมาแสดงผล -->
    <div id="root"></div>

    <!-- โค้ด React ของแอปพลิเคชัน -->
    <script type="text/babel" data-type="module">
        // นำเข้า React และเครื่องมือที่จำเป็นผ่านเครือข่าย
        import React, { useState, useMemo, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
          Wallet, TrendingUp, TrendingDown, PlusCircle, List as ListIcon, 
          Home, Trash2, Calendar, DollarSign, Bike, Coffee, Wrench, Wifi, MoreHorizontal, Clock,
          Play, StopCircle, Sun, CheckCircle2, Receipt, CalendarDays, ChevronLeft, ChevronRight, Moon
        } from 'https://esm.sh/lucide-react@0.292.0';

        // นำเข้า Firebase SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ฟังก์ชันช่วยจัดการเรื่องเวลาของไทย (ป้องกันเวลาเคลื่อนตอนเที่ยงคืน)
        const getLocalISODate = (date = new Date()) => {
          const offset = date.getTimezoneOffset() * 60000;
          return new Date(date.getTime() - offset).toISOString().split('T')[0];
        };

        // ข้อมูลแพลตฟอร์มต่างๆ และสี
        const PLATFORMS = {
          'Grab': { color: 'bg-green-600', textColor: 'text-green-600' },
          'LINE MAN': { color: 'bg-green-500', textColor: 'text-green-500' },
          'Foodpanda': { color: 'bg-pink-600', textColor: 'text-pink-600' },
          'ShopeeFood': { color: 'bg-orange-500', textColor: 'text-orange-500' },
          'Lalamove': { color: 'bg-orange-600', textColor: 'text-orange-600' },
          'inDrive': { color: 'bg-green-400', textColor: 'text-green-400' },
          'Bolt': { color: 'bg-green-700', textColor: 'text-green-700' },
          'อื่นๆ': { color: 'bg-gray-600', textColor: 'text-gray-600' }
        };

        const EXPENSE_CATEGORIES = {
          'ค่าน้ำมัน': { icon: Bike, color: 'text-orange-500' },
          'ค่าอาหาร/น้ำ': { icon: Coffee, color: 'text-blue-500' },
          'ซ่อมบำรุงรถ': { icon: Wrench, color: 'text-gray-700' },
          'ค่าเน็ต/โทรศัพท์': { icon: Wifi, color: 'text-purple-500' },
          'อื่นๆ': { icon: MoreHorizontal, color: 'text-gray-500' }
        };

        const GREETINGS = [
          "ขอให้วันนี้เป็นวันที่ดี ออเดอร์ปังๆ ทิปแน่นๆ นะครับ! 🛵💨",
          "ขับขี่ปลอดภัย ลูกค้าน่ารัก ได้โบนัสรัวๆ ครับ! 🌟",
          "สู้ๆ ครับไรเดอร์คนเก่ง วันนี้เป้าหมายทะลุเป้าแน่นอน! 💪",
          "อากาศจะร้อนหรือฝนจะตก ก็ขอให้ใจร่มๆ ได้งานเยอะๆ นะครับ! 🌤️",
          "เริ่มต้นวันใหม่ ขอให้เงินไหลมาเทมา ปลอดภัยตลอดสายครับ! 💸",
          "ลุยเลย! ถนนโล่งๆ ลูกค้ารอแจกทิปอยู่ครับ 🎉"
        ];

        // 🔴 Firebase Config ของคุณ 🔴
        const myFirebaseConfig = {
          apiKey: "AIzaSyAOuX9u4eYf8OVFS_Djqceu1MAiasPa5Wc",
          authDomain: "rider-ca9e9.firebaseapp.com",
          projectId: "rider-ca9e9",
          storageBucket: "rider-ca9e9.firebasestorage.app",
          messagingSenderId: "445078558662",
          appId: "1:445078558662:web:e832ac83b64280304944c7",
          measurementId: "G-LWCVR69NMD"
        };

        // ตรวจสอบว่ารันบนหน้าต่างพรีวิว หรือ GitHub Pages เพื่อเลือกใช้ Config ที่ถูกต้อง
        const isCanvasEnv = typeof __firebase_config !== 'undefined';
        const finalFirebaseConfig = isCanvasEnv ? JSON.parse(__firebase_config) : myFirebaseConfig;
        const currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'rider-pocket';

        // ตั้งค่าระบบฐานข้อมูล Firebase
        const app = initializeApp(finalFirebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function App() {
          const [activeTab, setActiveTab] = useState('dashboard'); // dashboard, calendar, add, history
          const [records, setRecords] = useState([]);
          const [isLoading, setIsLoading] = useState(true);
          const [connectionError, setConnectionError] = useState('');
          const [user, setUser] = useState(null);
          
          // Dark Mode State
          const [isDarkMode, setIsDarkMode] = useState(() => {
            const saved = localStorage.getItem('riderDarkMode');
            return saved === 'true';
          });

          // Work Status State ('idle', 'working', 'on_break')
          const [workStatus, setWorkStatus] = useState(() => localStorage.getItem('riderWorkStatus') || 'idle');
          
          // Modal State
          const [modalConfig, setModalConfig] = useState({ isOpen: false, type: null });
          const [currentGreeting, setCurrentGreeting] = useState('');
          
          // Form State
          const [formType, setFormType] = useState('income');
          const [amount, setAmount] = useState('');
          const [platform, setPlatform] = useState('Grab');
          const [category, setCategory] = useState('ค่าน้ำมัน');
          const [note, setNote] = useState('');
          const [date, setDate] = useState(getLocalISODate());
          const [time, setTime] = useState(new Date().toTimeString().split(' ')[0].substring(0, 5));

          // Calendar State
          const [calendarMonth, setCalendarMonth] = useState(new Date());
          const [selectedCalDate, setSelectedCalDate] = useState(getLocalISODate());

          // จัดการการเปิด-ปิด Dark Mode และเซฟลง Local Storage
          useEffect(() => {
            if (isDarkMode) {
              document.documentElement.classList.add('dark');
            } else {
              document.documentElement.classList.remove('dark');
            }
            localStorage.setItem('riderDarkMode', isDarkMode);
          }, [isDarkMode]);

          // อัปเดต Local Storage ทุกครั้งที่ Work Status เปลี่ยนแปลง
          useEffect(() => {
            localStorage.setItem('riderWorkStatus', workStatus);
          }, [workStatus]);

          // 1. จัดการระบบล็อกอิน
          useEffect(() => {
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  await signInAnonymously(auth);
                }
              } catch (error) {
                console.error("Auth error:", error);
                setConnectionError(`Auth error: ${error.message}`);
              }
            };
            initAuth();
            
            const unsubscribe = onAuthStateChanged(auth, setUser);
            return () => unsubscribe();
          }, []);

          // 2. ดึงข้อมูลจาก Firebase Firestore แบบ Real-time
          useEffect(() => {
            if (!user) return;
            
            setIsLoading(true);
            setConnectionError('');
            
            const recordsRef = collection(db, 'artifacts', currentAppId, 'users', user.uid, 'records');
            
            const unsubscribe = onSnapshot(recordsRef, (snapshot) => {
              const data = [];
              snapshot.forEach((doc) => {
                data.push({ id: doc.id, ...doc.data() });
              });
              
              data.sort((a, b) => {
                const dateA = new Date(a.date + 'T' + (a.time || '00:00'));
                const dateB = new Date(b.date + 'T' + (b.time || '00:00'));
                return dateB - dateA;
              });
              
              setRecords(data);
              setIsLoading(false);
            }, (error) => {
              console.error("Firebase fetch error:", error);
              setConnectionError("ไม่สามารถดึงข้อมูลได้ โปรดตรวจสอบการเชื่อมต่ออินเทอร์เน็ต");
              setIsLoading(false);
            });
            
            return () => unsubscribe(); 
          }, [user]);

          // คำนวณสรุปยอดทั้งหมด
          const summary = useMemo(() => {
            let totalIncome = 0;
            let totalExpense = 0;
            let totalTrips = 0;
            const platformTotals = {};

            records.forEach(record => {
              const amt = parseFloat(record.amount);
              if (record.type === 'income') {
                totalIncome += amt;
                totalTrips += 1;
                platformTotals[record.platform] = (platformTotals[record.platform] || 0) + amt;
              } else {
                totalExpense += amt;
              }
            });

            return {
              totalIncome,
              totalExpense,
              totalTrips,
              net: totalIncome - totalExpense,
              platformTotals
            };
          }, [records]);

          // จัดกลุ่มข้อมูลรายวันสำหรับปฏิทิน
          const dailyData = useMemo(() => {
            const grouped = {};
            records.forEach(r => {
              if (!grouped[r.date]) {
                grouped[r.date] = { income: 0, expense: 0, net: 0, trips: 0, records: [] };
              }
              const amt = parseFloat(r.amount);
              if (r.type === 'income') {
                grouped[r.date].income += amt;
                grouped[r.date].net += amt;
                grouped[r.date].trips += 1;
              } else {
                grouped[r.date].expense += amt;
                grouped[r.date].net -= amt;
              }
              grouped[r.date].records.push(r);
            });
            return grouped;
          }, [records]);

          // คำนวณสรุปยอด "เฉพาะวันนี้"
          const todaySummary = useMemo(() => {
            const todayStr = getLocalISODate();
            return dailyData[todayStr] || { income: 0, expense: 0, net: 0, trips: 0, records: [] };
          }, [dailyData]);

          // 3. จัดการการบันทึกข้อมูล
          const handleSave = async (e) => {
            e.preventDefault();
            if (!amount || isNaN(amount) || amount <= 0 || !user) return;

            const newRecord = {
              type: formType,
              amount: parseFloat(amount),
              date: date,
              time: time,
              note: note,
              ...(formType === 'income' ? { platform } : { category }),
              timestamp: new Date().toISOString()
            };
            
            try {
              const newDocRef = doc(collection(db, 'artifacts', currentAppId, 'users', user.uid, 'records'));
              await setDoc(newDocRef, newRecord);
              
              setAmount('');
              setNote('');
              setTime(new Date().toTimeString().split(' ')[0].substring(0, 5));
              setActiveTab('dashboard');
            } catch (error) {
              console.error("บันทึกข้อมูลลง Firebase ไม่สำเร็จ:", error);
              setConnectionError("บันทึกข้อมูลไม่สำเร็จ กรุณาลองใหม่อีกครั้ง");
            }
          };

          // 4. ลบข้อมูล
          const deleteRecord = async (id) => {
            if (!user) return;
            try {
              await deleteDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'records', id));
            } catch (error) {
              console.error("Delete error:", error);
            }
          };

          // ฟังก์ชันจัดการสถานะการทำงาน
          const handleStartWork = () => {
            const randomMsg = GREETINGS[Math.floor(Math.random() * GREETINGS.length)];
            setCurrentGreeting(randomMsg);
            setWorkStatus('working');
            setDate(getLocalISODate()); 
            setModalConfig({ isOpen: true, type: 'greeting' });
          };

          const handleTakeBreak = () => setWorkStatus('on_break');
          const handleResumeWork = () => setWorkStatus('working');
          const promptEndWork = () => setModalConfig({ isOpen: true, type: 'end_confirm' });
          
          const handleEndWork = () => {
            setWorkStatus('idle'); 
            setModalConfig({ isOpen: true, type: 'end_summary' }); 
          };

          const closeModal = () => setModalConfig({ isOpen: false, type: null });

          // --- ส่วนประกอบ UI: Dashboard ---
          const renderDashboard = () => (
            <div className="space-y-4 animate-in fade-in slide-in-from-bottom-2 duration-300">
              
              {connectionError && (
                <div className="bg-red-50 text-red-600 p-3 rounded-xl text-sm border border-red-200">
                  ⚠️ {connectionError}
                </div>
              )}

              {/* วิดเจ็ต: สถานะการทำงาน */}
              <div className="bg-white dark:bg-gray-800 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-700 transition-colors">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-gray-800 dark:text-white font-semibold flex items-center">
                    <Clock className="w-5 h-5 mr-2 text-indigo-500 dark:text-indigo-400" /> สถานะงานวันนี้
                  </h3>
                  {workStatus === 'working' && <span className="flex items-center text-xs font-bold text-green-600 dark:text-green-400 bg-green-100 dark:bg-green-900/40 px-2 py-1 rounded-full"><span className="w-2 h-2 rounded-full bg-green-500 mr-1 animate-pulse"></span> กำลังวิ่งงาน</span>}
                  {workStatus === 'on_break' && <span className="flex items-center text-xs font-bold text-amber-600 dark:text-amber-400 bg-amber-100 dark:bg-amber-900/40 px-2 py-1 rounded-full"><Coffee className="w-3 h-3 mr-1" /> พักผ่อน</span>}
                </div>

                {workStatus === 'idle' && (
                  <button onClick={handleStartWork} className="w-full bg-gradient-to-r from-indigo-600 to-blue-500 text-white font-bold py-4 rounded-xl shadow-md hover:shadow-lg transition flex items-center justify-center active:scale-[0.98]">
                    <Play className="w-6 h-6 mr-2" fill="currentColor" /> เริ่มงานวันนี้
                  </button>
                )}

                {workStatus === 'working' && (
                  <div className="flex space-x-3">
                    <button onClick={handleTakeBreak} className="flex-1 bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-400 font-bold py-3 rounded-xl hover:bg-amber-200 dark:hover:bg-amber-900/60 transition flex items-center justify-center active:scale-[0.98]">
                      <Coffee className="w-5 h-5 mr-2" /> พักแป๊บ
                    </button>
                    <button onClick={promptEndWork} className="flex-1 bg-rose-100 dark:bg-rose-900/40 text-rose-700 dark:text-rose-400 font-bold py-3 rounded-xl hover:bg-rose-200 dark:hover:bg-rose-900/60 transition flex items-center justify-center active:scale-[0.98]">
                      <StopCircle className="w-5 h-5 mr-2" /> จบงาน
                    </button>
                  </div>
                )}

                {workStatus === 'on_break' && (
                  <div className="flex space-x-3">
                    <button onClick={handleResumeWork} className="flex-1 bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-400 font-bold py-3 rounded-xl hover:bg-green-200 dark:hover:bg-green-900/60 transition flex items-center justify-center active:scale-[0.98]">
                      <Play className="w-5 h-5 mr-2" fill="currentColor" /> ลุยต่อ
                    </button>
                    <button onClick={promptEndWork} className="flex-1 bg-rose-100 dark:bg-rose-900/40 text-rose-700 dark:text-rose-400 font-bold py-3 rounded-xl hover:bg-rose-200 dark:hover:bg-rose-900/60 transition flex items-center justify-center active:scale-[0.98]">
                      <StopCircle className="w-5 h-5 mr-2" /> จบงาน
                    </button>
                  </div>
                )}
              </div>

              {/* การ์ดสรุปยอดรวม */}
              <div className="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl p-5 text-white shadow-lg">
                <div className="flex justify-between items-center mb-1">
                  <h2 className="text-blue-100 text-sm font-medium">กำไรสุทธิทั้งหมด (บาท)</h2>
                  {isLoading && <span className="text-xs text-blue-200 animate-pulse">กำลังซิงค์...</span>}
                </div>
                <div className="text-4xl font-bold tracking-tight">
                  ฿{summary.net.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                </div>
                
                <div className="grid grid-cols-3 gap-3 mt-6">
                  <div className="bg-white/10 rounded-xl p-3 flex flex-col items-center justify-center">
                    <div className="flex items-center text-blue-200 text-xs mb-1">
                      <Bike className="w-3 h-3 mr-1" /> รอบวิ่ง
                    </div>
                    <div className="text-lg font-semibold">{summary.totalTrips}</div>
                  </div>
                  <div className="bg-white/10 rounded-xl p-3 flex flex-col items-center justify-center">
                    <div className="flex items-center text-green-200 text-xs mb-1">
                      <TrendingUp className="w-3 h-3 mr-1" /> รายรับ
                    </div>
                    <div className="text-lg font-semibold">฿{summary.totalIncome.toLocaleString('th-TH')}</div>
                  </div>
                  <div className="bg-white/10 rounded-xl p-3 flex flex-col items-center justify-center">
                    <div className="flex items-center text-red-200 text-xs mb-1">
                      <TrendingDown className="w-3 h-3 mr-1" /> รายจ่าย
                    </div>
                    <div className="text-lg font-semibold">฿{summary.totalExpense.toLocaleString('th-TH')}</div>
                  </div>
                </div>
              </div>

              {/* สรุปรายได้แยกตามค่าย */}
              <div className="bg-white dark:bg-gray-800 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-700 transition-colors">
                <h3 className="text-gray-800 dark:text-white font-semibold mb-4 flex items-center">
                  <Wallet className="w-5 h-5 mr-2 text-indigo-500 dark:text-indigo-400" /> 
                  รายได้แยกตามค่าย (ทั้งหมด)
                </h3>
                
                {Object.keys(summary.platformTotals).length > 0 ? (
                  <div className="space-y-3">
                    {Object.entries(summary.platformTotals)
                      .sort(([,a], [,b]) => b - a)
                      .map(([plat, val]) => (
                      <div key={plat} className="flex items-center justify-between">
                        <div className="flex items-center">
                          <div className={`w-3 h-3 rounded-full mr-3 ${PLATFORMS[plat]?.color || 'bg-gray-500'}`}></div>
                          <span className="text-gray-700 dark:text-gray-300 font-medium">{plat}</span>
                        </div>
                        <div className="font-semibold text-gray-900 dark:text-white">฿{val.toLocaleString('th-TH')}</div>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="text-center text-gray-400 py-4 text-sm">
                    {isLoading ? 'กำลังโหลดข้อมูล...' : 'ยังไม่มีข้อมูลรายรับ'}
                  </div>
                )}
              </div>
            </div>
          );

          // --- ส่วนประกอบ UI: Calendar ---
          const renderCalendar = () => {
            const THAI_MONTHS = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            const THAI_DAYS = ["อา", "จ", "อ", "พ", "พฤ", "ศ", "ส"];

            const year = calendarMonth.getFullYear();
            const month = calendarMonth.getMonth();
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            const prevMonth = () => setCalendarMonth(new Date(year, month - 1, 1));
            const nextMonth = () => setCalendarMonth(new Date(year, month + 1, 1));

            const days = [];
            for (let i = 0; i < firstDay; i++) days.push(null);
            for (let i = 1; i <= daysInMonth; i++) days.push(i);

                    {/* Modal: ยืนยันจบงาน */}
                    {modalConfig.type === 'end_confirm' && (
                      <div className="text-center">
                        <div className="bg-gradient-to-br from-rose-400 to-red-500 text-white w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-5 shadow-lg shadow-rose-200 dark:shadow-none">
                          <CheckCircle2 className="w-10 h-10" />
                        </div>
                        <h3 className="text-2xl font-bold text-gray-800 dark:text-white mb-2">จบงานวันนี้?</h3>
                        <p className="text-gray-600 dark:text-gray-300 mb-8">คุณวิ่งงานมาเหนื่อยแล้ว ต้องการจบงานเพื่อดูสรุปยอดใช่ไหมครับ?</p>
                        <div className="flex space-x-3">
                          <button onClick={closeModal} className="flex-1 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 font-bold py-4 rounded-xl hover:bg-gray-200 dark:hover:bg-gray-600 active:scale-[0.98] transition">
                            ยังก่อน
                          </button>
                          <button onClick={handleEndWork} className="flex-1 bg-rose-600 text-white font-bold py-4 rounded-xl hover:bg-rose-700 shadow-md active:scale-[0.98] transition">
                            ใช่, จบงานเลย
                          </button>
                        </div>
                      </div>
                    )}

                    {/* Modal: สรุปยอดหลังจบงาน */}
                    {modalConfig.type === 'end_summary' && (
                      <div className="text-center">
                        <div className="bg-gradient-to-br from-indigo-500 to-blue-600 text-white w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-5 shadow-lg shadow-indigo-200 dark:shadow-none">
                          <Receipt className="w-10 h-10" />
                        </div>
                        <h3 className="text-2xl font-bold text-gray-800 dark:text-white mb-2">สรุปยอดวันนี้</h3>
                        <p className="text-gray-600 dark:text-gray-300 mb-5">เก่งมากครับ! พักผ่อนให้เต็มที่นะ 🎉</p>

                        <div className="bg-gray-50 dark:bg-gray-700/50 rounded-xl p-4 mb-4 text-left space-y-3">
                          <div className="flex justify-between items-center border-b border-gray-200 dark:border-gray-600 pb-2">
                            <span className="text-gray-600 dark:text-gray-300">วิ่งไปทั้งหมด</span>
                            <span className="font-bold text-gray-800 dark:text-white">{todaySummary.trips} รอบ</span>
                          </div>
                          <div className="flex justify-between items-center border-b border-gray-200 dark:border-gray-600 pb-2">
                            <span className="text-gray-600 dark:text-gray-300">รายรับรวม</span>
                            <span className="font-bold text-green-600 dark:text-green-400">฿{todaySummary.income.toLocaleString('th-TH')}</span>
                          </div>
                          <div className="flex justify-between items-center border-b border-gray-200 dark:border-gray-600 pb-2">
                            <span className="text-gray-600 dark:text-gray-300">รายจ่ายรวม</span>
                            <span className="font-bold text-red-600 dark:text-red-400">฿{todaySummary.expense.toLocaleString('th-TH')}</span>
                          </div>
                          <div className="flex justify-between items-center pt-1">
                            <span className="text-gray-800 dark:text-white font-bold">กำไรสุทธิ</span>
                            <span className="font-bold text-indigo-600 dark:text-indigo-400 text-xl">฿{todaySummary.net.toLocaleString('th-TH')}</span>
                          </div>
                        </div>

                        <button onClick={closeModal} className="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 shadow-md active:scale-[0.98] transition">
                          ปิดหน้าต่าง
                        </button>
                      </div>
                    )}

                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
